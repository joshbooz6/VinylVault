    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #bg-collage {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            grid-auto-rows: 150px;
            filter: blur(10px) brightness(0.4);
            overflow: hidden;
            background-color: #020617;
        }
        #bg-collage img { width: 100%; height: 100%; object-fit: cover; opacity: 0.2; }
        .folder-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out, opacity 0.3s ease;
            opacity: 0;
        }
        .folder-open .folder-content { max-height: 5000px; opacity: 1; }
        .chevron { transition: transform 0.3s ease; }
        .folder-open .chevron { transform: rotate(90deg); }
        .main-container {
            background-color: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2rem;
            margin-top: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        #albumModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .modal-content {
            background: white;
            border-radius: 1.5rem;
            max-width: 600px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .side-label { font-size: 0.7rem; font-weight: 900; color: #6366f1; letter-spacing: 0.1em; }
        .track-num { color: #94a3b8; font-family: monospace; width: 24px; display: inline-block; }
    </style>
</head>

        async function getAlbumArt(artist, album) {
            const query = encodeURIComponent(`${artist} ${album}`);
            try {
                const response = await fetch(`https://itunes.apple.com/search?term=${query}&entity=album&limit=1`);
                const data = await response.json();
                return data.results?.[0]?.artworkUrl100.replace('100x100bb', '600x600bb') || 'https://via.placeholder.com/600?text=Vinyl';
            } catch (e) { return 'https://via.placeholder.com/600?text=Vinyl'; }
        }

            const artist = collection.find(a => a.artist === artistName);
            const album = artist.albums.find(al => al.title === albumTitle);
            const body = document.getElementById('modalBody');
            
            body.innerHTML = `<div class="p-20 text-center"><div class="animate-spin h-8 w-8 border-4 border-indigo-500 border-t-transparent rounded-full mx-auto"></div></div>`;
            document.getElementById('albumModal').style.display = 'flex';

            const artUrl = await getAlbumArt(artistName, albumTitle);

            body.innerHTML = `
                <img src="${artUrl}" class="w-full aspect-square object-cover rounded-xl shadow-lg mb-6">
                <h2 class="text-2xl font-black text-slate-800">${album.title}</h2>
                <p class="text-indigo-600 font-bold text-xs uppercase tracking-widest mb-6">${artistName}</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <h3 class="side-label mb-3 uppercase">Side A</h3>
                        <ul class="space-y-2">
                            ${album.sideA.map((t, i) => `<li class="text-sm text-slate-600"><span class="track-num">${i+1}</span> ${t}</li>`).join('')}
                        </ul>
                    </div>
                    <div>
                        <h3 class="side-label mb-3 uppercase">Side B</h3>
                        <ul class="space-y-2">
                            ${album.sideB.map((t, i) => `<li class="text-sm text-slate-600"><span class="track-num">${album.sideA.length + i + 1}</span> ${t}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `;
        }

        function closeModal() { document.getElementById('albumModal').style.display = 'none'; }

        function renderDirectory() {
            const list = document.getElementById('directoryList');
            let totalAlbums = 0;
            list.innerHTML = '';

            collection.forEach((item, i) => {
                totalAlbums += item.albums.length;
                const div = document.createElement('div');
                div.className = "artist-container bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm mb-4";
                div.id = `artist-${i}`;
                div.innerHTML = `
                    <button onclick="toggleFolder(${i})" class="w-full flex items-center justify-between p-5 text-left focus:outline-none hover:bg-slate-50 transition-colors">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-slate-800 text-white rounded-full flex items-center justify-center font-bold text-xs">${item.artist.charAt(0)}</div>
                            <div>
                                <h4 class="font-bold text-slate-800">${item.artist}</h4>
                                <p class="text-[10px] text-slate-400 uppercase tracking-widest">${item.albums.length} Records</p>
                            </div>
                        </div>
                        <svg class="chevron w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <div class="folder-content bg-slate-50 border-t border-slate-100">
                        <div id="grid-${i}" class="p-4 grid gap-2"></div>
                    </div>
                `;
                list.appendChild(div);
            });
            document.getElementById('artistCount').innerText = collection.length;
            document.getElementById('albumCount').innerText = totalAlbums;
        }

        async function loadArt(i) {
            const grid = document.getElementById(`grid-${i}`);
            if (grid.dataset.loaded) return;
            grid.innerHTML = '<div class="p-4 text-xs text-slate-400 animate-pulse text-center">Opening crate...</div>';
            let html = '';
            for (const al of collection[i].albums) {
                const url = await getAlbumArt(collection[i].artist, al.title);
                html += `
                    <div onclick="showAlbumDetails('${collection[i].artist.replace(/'/g, "\\'")}', '${al.title.replace(/'/g, "\\")}')" 
                         class="flex items-center gap-4 p-3 bg-white rounded-xl border border-slate-200 cursor-pointer hover:border-indigo-400 transition-all shadow-sm">
                        <img src="${url}" class="w-12 h-12 rounded-lg object-cover">
                        <div class="flex-1 overflow-hidden">
                            <p class="font-bold text-sm text-slate-700 truncate">${al.title}</p>
                            <p class="text-[9px] text-indigo-500 font-black uppercase tracking-widest">View Sides</p>
                        </div>
                    </div>
                `;
            }
            grid.innerHTML = html;
            grid.dataset.loaded = "true";
        }

        function toggleFolder(i) {
            const el = document.getElementById(`artist-${i}`);
            const open = el.classList.toggle('folder-open');
            if (open) loadArt(i);
        }

        function filterArtists() {
            const q = document.getElementById('directorySearch').value.toLowerCase();
            document.querySelectorAll('.artist-container').forEach((el, i) => {
                const match = collection[i].artist.toLowerCase().includes(q) || 
                              collection[i].albums.some(al => al.title.toLowerCase().includes(q));
                el.style.display = match ? 'block' : 'none';
            });
        }

        async function pickRandomAlbum() {
            const all = [];
            collection.forEach((a, ai) => a.albums.forEach(al => all.push({ai, a: a.artist, t: al.title})));
            const p = all[Math.floor(Math.random() * all.length)];
            const el = document.getElementById(`artist-${p.ai}`);
            document.querySelectorAll('.artist-container').forEach(c => c.classList.remove('folder-open'));
            el.classList.add('folder-open');
            await loadArt(p.ai);
            el.scrollIntoView({behavior: 'smooth', block: 'center'});
            setTimeout(() => showAlbumDetails(p.a, p.t), 500);
        }

        async function buildBackground() {
            const bg = document.getElementById('bg-collage');
            const flat = [];
            collection.forEach(a => a.albums.forEach(al => flat.push({artist: a.artist, title: al.title})));
            const select = flat.sort(() => 0.5 - Math.random()).slice(0, 45);
            for (const item of select) {
                const url = await getAlbumArt(item.artist, item.title);
                const img = document.createElement('img');
                img.src = url;
                bg.appendChild(img);
            }
        }

        renderDirectory();
        buildBackground();
    </script>
</body>
</html>
